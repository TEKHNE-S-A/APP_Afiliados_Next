services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: app_afiliados_backend
    env_file:
      - ./backend/.env.docker
    environment:
      PORT: 3010
      NODE_ENV: production
    ports:
      - "3010:3010"
    init: true
    volumes:
      - ./backend/uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/health', (r)=>process.exit(r.statusCode===200?0:1)).on('error', ()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  backend-dev:
    profiles: ["dev"]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: app_afiliados_backend_dev
    env_file:
      - ./backend/.env.docker
    environment:
      PORT: 3010
      NODE_ENV: development
    ports:
      - "3001:3010"
    init: true
    command: ["node", "--watch", "server-soap.js"]
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/health', (r)=>process.exit(r.statusCode===200?0:1)).on('error', ()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  backend_node_modules:

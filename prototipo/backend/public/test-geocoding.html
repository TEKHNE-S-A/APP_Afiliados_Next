<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Geocodificación</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 10px 5px; }
    #stats { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 5px; }
    #log { background: #000; color: #0f0; padding: 15px; margin: 10px 0; border-radius: 5px; font-family: monospace; white-space: pre-wrap; min-height: 200px; }
    .success { color: #28a745; }
    .error { color: #dc3545; }
  </style>
</head>
<body>
  <h1>🌍 Test de Geocodificación</h1>
  
  <div id="stats">
    <h3>Estadísticas</h3>
    <p id="statsContent">Cargando...</p>
    <button onclick="loadStats()">🔄 Actualizar Stats</button>
  </div>
  
  <div>
    <h3>Acciones</h3>
    <button onclick="processGeocoding(5)">🚀 Procesar 5 registros</button>
    <button onclick="processGeocoding(50)">🚀 Procesar 50 registros</button>
    <button onclick="processGeocoding(100)">🚀 Procesar 100 registros</button>
  </div>
  
  <div id="log"></div>

  <script>
    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const timestamp = new Date().toLocaleTimeString();
      const color = type === 'success' ? '#0f0' : type === 'error' ? '#f00' : '#fff';
      logDiv.innerHTML += `<span style="color: ${color}">[${timestamp}] ${message}</span>\n`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function loadStats() {
      try {
        log('📊 Cargando estadísticas...');
        const response = await fetch('/admin/cartilla/geocoding/stats');
        const stats = await response.json();
        
        document.getElementById('statsContent').innerHTML = `
          <strong>Total:</strong> ${stats.total || 0}<br>
          <strong>Geocodificados:</strong> ${stats.geocodificados || 0} (${stats.porcentajeGeocod || 0}%)<br>
          <strong>Pendientes:</strong> ${stats.pendientes || 0}<br>
          <strong>Errores:</strong> ${stats.errores || 0}
        `;
        
        log(`✅ Stats actualizadas: ${stats.pendientes} pendientes`, 'success');
      } catch (error) {
        log(`❌ Error cargando stats: ${error.message}`, 'error');
      }
    }

    async function processGeocoding(batchSize) {
      try {
        log(`🌍 Iniciando geocodificación de ${batchSize} registros...`);
        
        const response = await fetch('/admin/cartilla/geocoding/process', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ batchSize })
        });
        
        const result = await response.json();
        
        log(`✅ Geocodificación completada:`, 'success');
        log(`   • Procesadas: ${result.processed}`, 'success');
        log(`   • Exitosas: ${result.success}`, 'success');
        log(`   • Errores: ${result.errors}`, result.errors === 0 ? 'success' : 'error');
        log(`   • Pendientes: ${result.pending}`, 'info');
        
        // Actualizar stats
        await loadStats();
      } catch (error) {
        log(`❌ Error procesando geocodificación: ${error.message}`, 'error');
      }
    }

    // Cargar stats al inicio
    loadStats();
  </script>
</body>
</html>
